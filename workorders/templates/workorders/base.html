<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoShop Pro - {% block title %}Dashboard{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ── Mensajes ── */
        .messages { margin-bottom: 20px; }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error   { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .alert-warning  { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
        .alert-info     { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }

        /* ── Header ── */
        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #667eea;
            font-size: 1.8em;
        }

        .header h1 a {
            text-decoration: none;
            color: inherit;
        }

        /* ── Navegación ── */
        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            display: inline-block;
            padding: 8px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav a.active {
            background: #333;
        }

        /* ── Cards ── */
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        /* ── Formularios ── */
        .form-group { margin-bottom: 20px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            padding: 10px 20px;
            font-size: 0.95em;
            width: auto;
            display: inline-block;
            text-decoration: none;
            text-align: center;
            color: white;
            border-radius: 5px;
            transition: transform 0.2s;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ── Tablas ── */
        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-size: 0.9em;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
        }

        tr:hover { background: #f8f9ff; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .badge-success { background: #28a745; }
        .badge-warning { background: #ffc107; color: #333; }
        .badge-danger  { background: #dc3545; }

        /* ── Dashboard grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-3px); }
        .stat-card .stat-icon { font-size: 2.5em; margin-bottom: 10px; }
        .stat-card .stat-number { font-size: 2em; font-weight: bold; color: #667eea; }
        .stat-card .stat-label { color: #666; margin-top: 5px; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state p { font-size: 1.1em; margin-top: 10px; }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .nav { justify-content: center; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>

<body>
    <div class="container">
        <!-- Header con Navegación -->
        <div class="header">
            <h1><a href="{% url 'dashboard' %}">🚗 AutoShop Pro</a></h1>
            <div class="nav">
                <a href="{% url 'dashboard' %}">📊 Dashboard</a>
                <a href="{% url 'registrar_propietario' %}">👤 Propietarios</a>
                <a href="{% url 'registrar_vehiculo' %}">🚙 Vehículos</a>
                <a href="{% url 'registrar_mecanico' %}">🔧 Mecánicos</a>
                <a href="{% url 'crear_orden' %}">📝 Crear Orden</a>
            </div>
        </div>

        <!-- Mensajes -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Contenido -->
        {% block content %}{% endblock %}
    </div>
</body>

</html>
