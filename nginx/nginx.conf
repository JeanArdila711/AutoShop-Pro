# nginx/nginx.conf
# Router de tráfico: implementa el Strangler Pattern en la capa de red.
# Las rutas /api/v1/ van al monolito Django.
# Las rutas /api/v2/predictivo/ van al microservicio Flask.

events {
    worker_connections 1024;
}

http {

    # ── Timeouts y configuración general ──
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    server {
        listen 80;
        server_name localhost;

        # ── Headers que se envían a los backends ──
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # ────────────────────────────────────────────────────────
        # RUTA v2: Microservicio Flask (ComponentePredictivo)
        # IMPORTANTE: Esta location debe ir ANTES de la de Django.
        # Nginx evalúa de arriba a abajo y la primera que coincide gana.
        # ────────────────────────────────────────────────────────
        location /api/v2/predictivo/ {
            proxy_pass http://predictivo_service:5000;
            # El nombre 'predictivo_service' es el nombre del servicio en docker-compose.yml
        }

        # ────────────────────────────────────────────────────────
        # RUTA v1: Monolito Django (todo lo demás)
        # Las rutas /api/v1/, /workorders/, /admin/, etc.
        # ────────────────────────────────────────────────────────
        location / {
            proxy_pass http://django_web:8000;
            # El nombre 'django_web' es el nombre del servicio en docker-compose.yml
        }
    }
}