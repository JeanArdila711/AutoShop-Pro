# nginx/nginx.conf
# ─────────────────────────────────────────────────────────────
# API Gateway de AutoShop Pro — implementa el Strangler Pattern
#
# Reglas de ruteo:
#   /api/v2/<servicio>/*  → microservicios Flask (puertos 5000-5005)
#   /api/v1/*             → monolito Django (legado)
#   /                     → monolito Django (frontend HTML)
#
# IMPORTANTE: el orden importa. Nginx evalúa de arriba a abajo
# y la primera location que coincide gana. Las rutas v2/* deben
# ir ANTES que la location / genérica.
# ─────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # Timeouts y configuración general
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # Tamaño máximo de body (importante para upload de evidencias fotográficas)
    client_max_body_size   25M;

    server {
        listen 80;
        server_name localhost;

        # Headers que se envían a los backends
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ─────────────────────────────────────────────────────
        # MICROSERVICIOS FLASK (API v2)
        # ─────────────────────────────────────────────────────

        # Órdenes de trabajo
        location /api/v2/ordenes/ {
            proxy_pass http://ordenes_service:5001;
        }

        # Inventario + Catálogo público (servicio a proveer al aliado)
        location /api/v2/inventario/ {
            proxy_pass http://inventario_service:5002;
        }
        location /api/v2/catalogo/ {
            proxy_pass http://inventario_service:5002;
        }

        # Facturación
        location /api/v2/facturacion/ {
            proxy_pass http://facturacion_service:5003;
        }

        # Predictivo (ya existía)
        location /api/v2/predictivo/ {
            proxy_pass http://predictivo_service:5000;
        }

        # Citas
        location /api/v2/citas/ {
            proxy_pass http://citas_service:5004;
        }

        # Notificaciones
        location /api/v2/notificaciones/ {
            proxy_pass http://notificaciones_service:5005;
        }

        # ─────────────────────────────────────────────────────
        # MONOLITO DJANGO (API v1 + frontend HTML)
        # Atrapa todo lo que no haya sido ruteado arriba
        # ─────────────────────────────────────────────────────
        location / {
            proxy_pass http://django_web:8000;
        }
    }
}
